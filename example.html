<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocLang CDN Example</title>
</head>
<body>
    <h1>DocLang Resume Generator</h1>
    <p>Click the button to generate a sample resume.</p>
    <button id="generateBtn">Generate Resume</button>
    <div id="status" style="margin-top: 20px; color: #666;"></div>
    
    <!-- 
        Before using this example, build the browser bundle first:
        npm run build:browser
    -->
    <script src="./packages/main/dist/doclang.min.js"></script>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            status.textContent = 'Generating resume...';
            
            try {
                // Access components from the global DocLang namespace
                const { Resume, Header, Name, Designation, Contact, Summary, Experience, ExperienceItem, Skills, Skill, Education, EducationItem } = DocLang;
                const { Packer } = DocLang.docx;
                
                const resume = Resume(
                    Header(
                        Name("John Doe"),
                        Designation("Senior Software Engineer"),
                        Contact({
                            email: "john@example.com",
                            phone: "+1 234 567 890",
                            linkedin: "linkedin.com/in/johndoe",
                            github: "github.com/johndoe"
                        })
                    ),
                    Summary(
                        "Experienced software engineer with 10+ years of expertise in full-stack development, cloud architecture, and team leadership."
                    ),
                    Experience(
                        ExperienceItem({
                            company: "Tech Corp",
                            designation: "Senior Software Engineer",
                            duration: "2020 - Present",
                            points: [
                                "Led development of microservices architecture",
                                "Mentored junior developers",
                                "Improved system performance by 40%"
                            ]
                        }),
                        ExperienceItem({
                            company: "StartupXYZ",
                            designation: "Full Stack Developer",
                            duration: "2018 - 2020",
                            points: [
                                "Built scalable web applications",
                                "Implemented CI/CD pipelines",
                                "Reduced deployment time by 60%"
                            ]
                        })
                    ),
                    Skills(
                        Skill("TypeScript"),
                        Skill("React"),
                        Skill("Node.js"),
                        Skill("Python"),
                        Skill("Cloud Architecture"),
                        Skill("Docker"),
                        Skill("Kubernetes")
                    ),
                    Education(
                        EducationItem({
                            degree: "M.S. Computer Science",
                            institution: "Stanford University",
                            year: "2015"
                        }),
                        EducationItem({
                            degree: "B.S. Computer Science",
                            institution: "MIT",
                            year: "2013"
                        })
                    )
                );

                const buffer = await Packer.toBuffer(resume);
                const blob = new Blob([buffer], { 
                    type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" 
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'resume.docx';
                a.click();
                URL.revokeObjectURL(url);
                
                status.textContent = 'Resume generated successfully!';
            } catch (error) {
                console.error('Error generating resume:', error);
                status.textContent = 'Error generating resume. Check console for details.';
            }
        });
        
        // Check if the script loaded
        if (typeof DocLang === 'undefined') {
            document.getElementById('status').innerHTML = 
                '<span style="color: red;">Error: DocLang library not loaded. Run <code>npm run build:browser</code> first.</span>';
        }
    </script>
</body>
</html>
